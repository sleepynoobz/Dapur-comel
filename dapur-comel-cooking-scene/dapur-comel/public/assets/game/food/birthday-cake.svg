  <path d="M121,34 C119,28 117,22 121,18 C125,22 123,28 121,34Z" fill="#FFD700" stroke="#FF8C00" stroke-width="1.5"/>
  <path d="M121,32 C120,28 119,24 121,22 C123,24 122,28 121,32Z" fill="white" opacity="0.7"/>

  <!-- Sparkle stars -->
  <path d="M68,22 L69.5,26 L73.5,27 L70.5,30 L71,34 L67.5,32 L64,34 L64.5,30 L61.5,27 L65.5,26Z" fill="#FFD700" stroke="#C8900A" stroke-width="1"/>
  <path d="M132,24 L133,27 L136,28 L133.5,30.5 L134,33.5 L131.5,32 L129,33.5 L129.5,30.5 L127,28 L130,27Z" fill="#FF69B4" stroke="#C02858" stroke-width="1"/>
