<svg viewBox="0 0 200 190" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="ck-body" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#FFB5D0"/>
      <stop offset="100%" stop-color="#E8527A"/>
    </radialGradient>
    <radialGradient id="ck-top" cx="40%" cy="30%" r="65%">
