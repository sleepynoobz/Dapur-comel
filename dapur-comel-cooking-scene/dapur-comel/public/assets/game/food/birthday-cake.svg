  <circle cx="88" cy="158" r="5" fill="#FF69B4" stroke="#C02858" stroke-width="1.5"/>
  <circle cx="108" cy="158" r="5" fill="#FFD700" stroke="#C8900A" stroke-width="1.5"/>
  <circle cx="128" cy="158" r="5" fill="#FF69B4" stroke="#C02858" stroke-width="1.5"/>
