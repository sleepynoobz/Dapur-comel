  <circle cx="100" cy="85" r="4.5" fill="rgba(255,255,255,0.85)" stroke="#2A1A0E" stroke-width="2"/>
  <circle cx="70" cy="46" r="5.5" fill="rgba(255,255,255,0.85)" stroke="#2A1A0E" stroke-width="2"/>
