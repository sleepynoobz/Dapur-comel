<svg viewBox="0 0 160 140" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="mt-body" cx="38%" cy="30%" r="68%">
      <stop offset="0%" stop-color="#E86040"/>
      <stop offset="100%" stop-color="#9B2418"/>
    </radialGradient>
    <radialGradient id="mt-fat" cx="40%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#FFF5DC"/>
      <stop offset="100%" stop-color="#F0D88A"/>
    </radialGradient>
  </defs>
  <!-- Drop shadow -->
  <ellipse cx="82" cy="132" rx="56" ry="7" fill="rgba(0,0,0,0.13)"/>

  <!-- Meat body — drumstick shape -->
  <path d="M30,120 Q14,108 14,84 Q14,54 38,44 Q54,38 64,48 Q72,54 78,56 Q88,46 104,40 Q128,32 140,52 Q154,72 144,98 Q138,118 120,124 Q100,130 80,126 Q55,128 30,120Z" fill="url(#mt-body)" stroke="#2A1A0E" stroke-width="3.5" stroke-linejoin="round"/>

  <!-- Fat marbling streaks -->
  <path d="M50,80 Q70,72 90,80 Q80,88 50,80Z" fill="url(#mt-fat)" stroke="#D4A840" stroke-width="1.5" opacity="0.8"/>
  <path d="M88,96 Q108,88 128,96 Q118,104 88,96Z" fill="url(#mt-fat)" stroke="#D4A840" stroke-width="1.5" opacity="0.7"/>
  <path d="M60,104 Q72,100 82,106 Q72,110 60,104Z" fill="url(#mt-fat)" stroke="#D4A840" stroke-width="1" opacity="0.6"/>

  <!-- Highlight -->
  <ellipse cx="54" cy="64" rx="22" ry="12" fill="rgba(255,160,120,0.4)" transform="rotate(-20 54 64)"/>
  <!-- Bone handle -->
  <path d="M68,44 Q60,30 50,24 Q44,20 40,24 Q36,28 40,34 Q44,40 52,42" stroke="#F5E8D0" stroke-width="8" fill="none" stroke-linecap="round"/>
  <circle cx="46" cy="26" r="9" fill="#F5E8D0" stroke="#2A1A0E" stroke-width="2.5"/>
  <circle cx="46" cy="26" r="5" fill="rgba(255,255,255,0.5)"/>
  <!-- Bone at other end -->
  <circle cx="56" cy="42" r="7" fill="#F5E8D0" stroke="#2A1A0E" stroke-width="2.5"/>
  <circle cx="56" cy="42" r="4" fill="rgba(255,255,255,0.5)"/>
</svg>
