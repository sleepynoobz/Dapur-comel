<svg viewBox="0 0 200 180" xmlns="http://www.w3.org/2000/svg">
  <!-- Drop shadow -->
  <ellipse cx="100" cy="172" rx="72" ry="8" fill="rgba(0,0,0,0.13)"/>
  <!-- Crust base -->
  <circle cx="100" cy="95" r="76" fill="#E8B86D" stroke="#2A1A0E" stroke-width="3.5"/>
  <!-- Crust texture ring -->
  <circle cx="100" cy="95" r="76" fill="none" stroke="#F5CC88" stroke-width="6" stroke-dasharray="8 6" opacity="0.5"/>
  <!-- Sauce layer -->
  <circle cx="100" cy="95" r="62" fill="#D94E2B"/>
  <!-- Sauce highlight -->
  <ellipse cx="86" cy="75" rx="22" ry="10" fill="rgba(255,120,80,0.35)" transform="rotate(-15 86 75)"/>
  <!-- Cheese layer -->
  <circle cx="100" cy="95" r="58" fill="#F9D55A"/>
  <!-- Cheese highlight -->
  <ellipse cx="82" cy="78" rx="18" ry="8" fill="rgba(255,255,200,0.5)" transform="rotate(-10 82 78)"/>

  <!-- Slice score lines -->
  <line x1="100" y1="95" x2="100" y2="19" stroke="#C87828" stroke-width="2.5" opacity="0.6"/>
  <line x1="100" y1="95" x2="166" y2="140" stroke="#C87828" stroke-width="2.5" opacity="0.6"/>
  <line x1="100" y1="95" x2="34" y2="140" stroke="#C87828" stroke-width="2.5" opacity="0.6"/>
  <line x1="100" y1="95" x2="168" y2="51" stroke="#C87828" stroke-width="2.5" opacity="0.6"/>
  <line x1="100" y1="95" x2="32" y2="51" stroke="#C87828" stroke-width="2.5" opacity="0.6"/>
  <line x1="100" y1="95" x2="100" y2="171" stroke="#C87828" stroke-width="2.5" opacity="0.6"/>

  <!-- Pepperoni -->
  <circle cx="100" cy="68" r="11" fill="#C0392B" stroke="#2A1A0E" stroke-width="2.5"/>
  <circle cx="100" cy="68" r="7" fill="#E74C3C"/>
  <ellipse cx="97" cy="65" rx="3" ry="2" fill="rgba(255,150,130,0.6)"/>

  <circle cx="72" cy="88" r="10" fill="#C0392B" stroke="#2A1A0E" stroke-width="2.5"/>
  <circle cx="72" cy="88" r="6.5" fill="#E74C3C"/>
  <ellipse cx="70" cy="85" rx="2.5" ry="1.5" fill="rgba(255,150,130,0.6)"/>

  <circle cx="128" cy="88" r="10" fill="#C0392B" stroke="#2A1A0E" stroke-width="2.5"/>
  <circle cx="128" cy="88" r="6.5" fill="#E74C3C"/>
  <ellipse cx="126" cy="85" rx="2.5" ry="1.5" fill="rgba(255,150,130,0.6)"/>

  <circle cx="85" cy="112" r="9" fill="#C0392B" stroke="#2A1A0E" stroke-width="2.5"/>
  <circle cx="85" cy="112" r="5.5" fill="#E74C3C"/>
  <ellipse cx="83" cy="110" rx="2" ry="1.5" fill="rgba(255,150,130,0.6)"/>

  <circle cx="116" cy="112" r="9" fill="#C0392B" stroke="#2A1A0E" stroke-width="2.5"/>
  <circle cx="116" cy="112" r="5.5" fill="#E74C3C"/>
  <ellipse cx="114" cy="110" rx="2" ry="1.5" fill="rgba(255,150,130,0.6)"/>

  <!-- Green pepper strips -->
  <rect x="95" y="78" width="10" height="4" rx="2" fill="#27AE60" stroke="#1A6B3A" stroke-width="1.5" transform="rotate(-30 95 78)"/>
  <rect x="118" y="100" width="9" height="3.5" rx="1.5" fill="#27AE60" stroke="#1A6B3A" stroke-width="1.5" transform="rotate(45 118 100)"/>
  <rect x="75" y="100" width="9" height="3.5" rx="1.5" fill="#27AE60" stroke="#1A6B3A" stroke-width="1.5" transform="rotate(-45 75 100)"/>

  <!-- Cheese pull strings -->
  <path d="M88,120 Q96,126 104,120" stroke="#E8C83A" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M112,118 Q118,125 125,117" stroke="#E8C83A" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.7"/>

  <!-- Outer crust outline (on top) -->
  <circle cx="100" cy="95" r="76" fill="none" stroke="#2A1A0E" stroke-width="3.5"/>
</svg>
