  <path d="M80,85 Q68,82 58,88" stroke="#2D7D32" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.5"/>
  <path d="M80,92 Q90,90 100,96" stroke="#2D7D32" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.5"/>

