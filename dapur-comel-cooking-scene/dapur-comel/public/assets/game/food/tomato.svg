<svg viewBox="0 0 140 150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="tm-body" cx="36%" cy="28%" r="68%">
      <stop offset="0%" stop-color="#FF6B55"/>
      <stop offset="100%" stop-color="#C0241C"/>
    </radialGradient>
  </defs>
  <!-- Drop shadow -->
  <ellipse cx="70" cy="142" rx="46" ry="7" fill="rgba(0,0,0,0.13)"/>

  <!-- Tomato body -->
  <circle cx="70" cy="90" r="52" fill="url(#tm-body)" stroke="#2A1A0E" stroke-width="3.5"/>
  <!-- Body shadow right -->
  <path d="M106,62 Q126,80 122,108 Q115,130 96,140" stroke="rgba(120,10,10,0.25)" stroke-width="12" fill="none" stroke-linecap="round"/>
  <!-- Highlight main -->
  <ellipse cx="52" cy="66" rx="18" ry="12" fill="rgba(255,200,190,0.5)" transform="rotate(-20 52 66)"/>
  <!-- Highlight secondary -->
  <ellipse cx="80" cy="56" rx="8" ry="5" fill="rgba(255,200,190,0.4)" transform="rotate(10 80 56)"/>

  <!-- Stem -->
  <path d="M70,38 Q68,28 62,22" stroke="#2D7D32" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M70,38 Q72,26 78,20" stroke="#2D7D32" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- Calyx leaves -->
  <path d="M54,38 Q58,28 70,36 Q62,42 54,38Z" fill="#43A047" stroke="#2A1A0E" stroke-width="2"/>
  <path d="M86,38 Q82,28 70,36 Q78,42 86,38Z" fill="#43A047" stroke="#2A1A0E" stroke-width="2"/>
  <path d="M62,32 Q66,22 70,36 Q64,36 62,32Z" fill="#66BB6A" stroke="#2A1A0E" stroke-width="1.5"/>
  <path d="M78,32 Q74,22 70,36 Q76,36 78,32Z" fill="#66BB6A" stroke="#2A1A0E" stroke-width="1.5"/>
  <!-- Stem base circle -->
  <ellipse cx="70" cy="38" rx="6" ry="4" fill="#43A047" stroke="#2A1A0E" stroke-width="2"/>

  <!-- Skin shine lines -->
  <path d="M62,72 Q70,110 76,130" stroke="rgba(180,30,20,0.18)" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M52,80 Q56,110 60,130" stroke="rgba(180,30,20,0.12)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
