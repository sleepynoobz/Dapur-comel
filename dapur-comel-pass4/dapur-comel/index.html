<!DOCTYPE html>
<html lang="ms">
  <head>
    <meta charset="UTF-8" />

    <!--
      viewport-fit=cover: extends into notch/Dynamic Island area
      maximum-scale=1: prevents accidental zoom during gameplay
      user-scalable=no: belt-and-suspenders zoom prevention
    -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1.0"
    />

    <!-- ── PWA / Install ─────────────────────────────────────────── -->
    <meta name="theme-color" content="#FF8C5A" />
    <meta name="application-name" content="Dapur Comel" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Dapur Comel" />

    <!-- Android Chrome -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Prevent phone/address detection overlays -->
    <meta name="format-detection" content="telephone=no,address=no,email=no" />

    <!-- ── Icons ─────────────────────────────────────────────────── -->
    <!-- Standard favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192x192.png" />

    <!-- iOS home screen icon (must be 180x180 for iPhone) -->
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />

    <!-- iOS splash screens — prevents white flash on PWA launch -->
    <!-- Device-specific splash screens would be generated here in full production -->
    <!-- For MVP, theme-color meta handles the splash tint -->

    <!-- ── Fonts ─────────────────────────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!--
      Nunito: rounded, friendly, high legibility for children.
      weights 700+800+900 only — no lighter weights needed.
      display=swap: text visible during font load (no FOIT).
    -->
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap"
      rel="stylesheet"
    />

    <!-- ── Preload critical mascot asset ─────────────────────────── -->
    <!-- xl asset used on HomeScreen — preload eliminates layout pop -->
    <link
      rel="preload"
      as="image"
      href="/assets/images/mascot/oyen-base-xl.webp"
      type="image/webp"
    />

    <!-- ── SEO / Meta ─────────────────────────────────────────────── -->
    <meta
      name="description"
      content="Dapur Comel — permainan masak-masak interaktif untuk kanak-kanak 3 tahun ke atas. Masak bersama Oyen Si Kucing!"
    />
    <meta name="robots" content="index, follow" />

    <title>Dapur Comel 🍰</title>

    <!-- ── Critical inline CSS ───────────────────────────────────── -->
    <!-- Prevents white flash before React mounts and Tailwind loads -->
    <style>
      *, *::before, *::after {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
      }
      html, body {
        margin: 0; padding: 0;
        width: 100%; height: 100%;
        overflow: hidden;
        background-color: #FFF8EC;   /* cream — matches app background */
        font-family: 'Nunito', system-ui, sans-serif;
        overscroll-behavior: none;
      }
      #root {
        width: 100%; height: 100%;
      }
      /* Prevent text selection everywhere (gameplay) */
      * { user-select: none; -webkit-user-select: none; }
      /* Re-enable selection in settings for parents */
      .allow-select { user-select: text; -webkit-user-select: text; }
      /* Thin scrollbar for settings panel */
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb {
        background: rgba(61, 43, 31, 0.15);
        border-radius: 2px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
